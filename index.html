<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIWAA PHOTOBOX</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; background: #fff0f5; color: #db2777; }
        .page { display: none; padding: 20px; }
        .active { display: block; }
        #booth { position: relative; width: 320px; height: 480px; margin: 10px auto; background: #000; border: 8px solid #fff; border-radius: 15px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        #frame-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #timer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 100px; font-weight: bold; z-index: 20; display: none; text-shadow: 0 0 20px rgba(0,0,0,0.7); }
        button { background: #ff69b4; color: #fff; border: none; padding: 15px 30px; border-radius: 50px; font-size: 18px; cursor: pointer; margin: 10px; font-weight: bold; }
        .frame-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px; }
        .frame-list img { width: 65px; height: 95px; border: 3px solid #ccc; cursor: pointer; border-radius: 5px; }
        .frame-list img.selected { border-color: #ff69b4; transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <h1>✨ WIWAA PHOTOBOX ✨</h1>
        <img src="profil.jpeg" style="width: 150px; border-radius: 50%; border: 5px solid #ff69b4;">
        <p>Siap untuk berfoto estetik?</p>
        <button onclick="showPage('page-select')">Mulai Sekarang</button>
    </div>

    <div id="page-select" class="page">
        <h2>Pilih Framemu</h2>
        <div class="frame-list">
            <img src="frame1.png" onclick="setFrame('frame1.png', this)" class="selected">
            <img src="frame2.png" onclick="setFrame('frame2.png', this)">
            <img src="frame4.png" onclick="setFrame('frame4.png', this)">
            <img src="frame5.png" onclick="setFrame('frame5.png', this)">
            <img src="frame6.png" onclick="setFrame('frame6.png', this)">
        </div>
        <button onclick="startBooth()">Lanjut ke Kamera</button>
    </div>

    <div id="page-camera" class="page">
        <div id="booth">
            <div id="timer">3</div>
            <video id="video" autoplay playsinline muted></video>
            <img id="frame-overlay" src="frame1.png">
        </div>
        <button id="snap-btn" onclick="countdown()">📷 Ambil Foto (Timer 3s)</button>
    </div>

    <div id="page-result" class="page">
        <h2>Hasil Fotomu!</h2>
        <canvas id="canvas" style="width: 250px; border: 8px solid #fff; border-radius: 10px;"></canvas>
        <p>Scan untuk ambil foto:</p>
        <img src="scan wa.png" style="width: 150px;">
        <br>
        <button onclick="location.reload()">Foto Lagi</button>
    </div>

    <script>
        let selectedFrame = 'frame1.png';
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function setFrame(src, el) {
            selectedFrame = src;
            document.getElementById('frame-overlay').src = src;
            document.querySelectorAll('.frame-list img').forEach(img => img.classList.remove('selected'));
            el.classList.add('selected');
        }

        async function startBooth() {
            showPage('page-camera');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                alert("Klik 'Allow' pada izin kamera di pojok kiri atas browser!");
            }
        }

        function countdown() {
            let count = 3;
            const timerEl = document.getElementById('timer');
            timerEl.style.display = 'block';
            timerEl.innerText = count;
            const interval = setInterval(() => {
                count--;
                if (count > 0) { timerEl.innerText = count; }
                else {
                    clearInterval(interval);
                    timerEl.style.display = 'none';
                    takeSnap();
                }
            }, 1000);
        }

        function takeSnap() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            const img = new Image();
            img.src = selectedFrame;
            img.onload = () => {
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                showPage('page-result');
                video.srcObject.getTracks().forEach(t => t.stop());
            };
        }
    </script>
</body>
</html>
