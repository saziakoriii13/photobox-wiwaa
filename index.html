<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIWAA PHOTOBOX</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 20px; background-color: #f7f7f7; }
        h1 { color: #db2777; margin-top: 0; }
        
        /* Booth Utama */
        #booth-container { display: flex; flex-direction: column; align-items: center; gap: 15px; max-width: 500px; margin: 0 auto; }
        #booth { position: relative; width: 100%; padding-top: 150%; /* Aspect Ratio 2:3 */ background-color: black; border: 8px solid white; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); overflow: hidden; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        
        /* Tombol & Pilihan Frame */
        #controls { display: flex; flex-direction: column; gap: 10px; align-items: center; margin-top: 15px; }
        #frame-options { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .frame-option { width: 60px; height: 90px; border: 3px solid transparent; cursor: pointer; border-radius: 8px; transition: border 0.3s; object-fit: cover; }
        .frame-option:hover, .frame-option.active { border-color: #db2777; }
        
        button { background-color: #f179b4; color: white; padding: 15px 30px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; font-size: 18px; box-shadow: 0 4px 10px rgba(255,105,180,0.3); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        /* Link WhatsApp */
        #wa-link { color: #25d366; font-size: 14px; text-decoration: none; margin-top: 10px; display: inline-block; }
    </style>
</head>
<body>

    <h1>✨ WIWAA PHOTOBOX ✨</h1>

    <div id="booth-container">
        <div id="booth">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
        </div>

        <div id="controls">
            <p style="margin: 0;">Pilih Frame:</p>
            <div id="frame-options">
                <img src="frame1.png" alt="Frame 1" class="frame-option active" onclick="selectFrame(this, 'frame1.png')">
                <img src="frame2.png" alt="Frame 2" class="frame-option" onclick="selectFrame(this, 'frame2.png')">
                <img src="frame3.png" alt="Frame 3" class="frame-option" onclick="selectFrame(this, 'frame3.png')">
            </div>

            <button id="capture-btn" onclick="takePhoto()">📷 Mulai Foto</button>
            
            <a href="https://wa.me/NO_WA_KAMU" id="wa-link" target="_blank">📲 Hubungi Kami via WhatsApp</a>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const captureBtn = document.getElementById('capture-btn');
        let currentFrameUrl = 'frame1.png'; // Frame default

        // 1. Nyalakan Kamera
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = stream;
            } catch (err) {
                console.error("Error akses kamera:", err);
                alert("Gagal mengakses kamera. Pastikan kamu mengizinkan akses kamera di browser.");
                captureBtn.disabled = true;
            }
        }

        // 2. Pilih Frame
        function selectFrame(imgElement, frameUrl) {
            currentFrameUrl = frameUrl;
            // Ganti frame yang aktif
            document.querySelectorAll('.frame-option').forEach(el => el.classList.remove('active'));
            imgElement.classList.add('active');
            // Re-draw frame di canvas
            drawFrameOnCanvas();
        }

        // 3. Gambar Frame di Canvas (di atas video)
        function drawFrameOnCanvas() {
            const frameImg = new Image();
            frameImg.src = currentFrameUrl;
            frameImg.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height); // Hapus frame lama
                ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height); // Gambar frame baru
            };
        }

        // 4. Ambil Foto (Fungsi Tombol Mulai)
        function takePhoto() {
            // Kita belum implementasi download fotonya, tapi tombolnya sudah aktif.
            alert("📷 Klik! (Fungsi download foto akan segera ditambahkan)");
        }

        // Jalankan Kamera & Seting Canvas saat load
        startCamera().then(() => {
            // Set ukuran canvas sama dengan video
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                drawFrameOnCanvas(); // Gambar frame pertama kali
            };
        });
    </script>

</body>
</html>
