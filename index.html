<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIWAA PHOTOBOX</title>
    <style>
        body { font-family: sans-serif; margin: 0; text-align: center; background: #fff0f5; }
        .page { display: none; padding: 20px; }
        .active { display: block; }
        
        /* Booth & Timer */
        #booth { position: relative; width: 320px; height: 480px; margin: 0 auto; background: #000; border: 10px solid #fff; border-radius: 10px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #frame-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #timer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 80px; font-weight: bold; z-index: 20; display: none; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        
        button { background: #ff69b4; color: #fff; border: none; padding: 15px 30px; border-radius: 50px; font-size: 18px; margin: 10px; cursor: pointer; }
        .frame-list img { width: 60px; height: 90px; margin: 5px; border: 2px solid #ccc; cursor: pointer; }
        .frame-list img.selected { border-color: #ff69b4; }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <h1>✨ WIWAA PHOTOBOX ✨</h1>
        <img src="profil.jpeg" style="width: 150px; border-radius: 50%;">
        <p>Siap untuk berfoto?</p>
        <button onclick="showPage('page-select')">Mulai Sekarang</button>
    </div>

    <div id="page-select" class="page">
        <h2>Pilih Framemu</h2>
        <div class="frame-list">
            <img src="frame1.png" onclick="setFrame('frame1.png', this)" class="selected">
            <img src="frame2.png" onclick="setFrame('frame2.png', this)">
            <img src="frame4.png" onclick="setFrame('frame4.png', this)">
        </div>
        <button onclick="startBooth()">Lanjut ke Kamera</button>
    </div>

    <div id="page-camera" class="page">
        <div id="booth">
            <div id="timer">3</div>
            <img id="frame-overlay" src="frame1.png">
            <video id="video" autoplay playsinline></video>
        </div>
        <button id="snap-btn" onclick="countdown()">📷 Ambil Foto (Timer)</button>
    </div>

    <div id="page-result" class="page">
        <h2>Hasil Fotomu!</h2>
        <canvas id="canvas" style="width: 200px; border: 5px solid #fff;"></canvas>
        <p>Scan di bawah untuk ambil foto:</p>
        <img src="scan wa.png" style="width: 150px;">
        <br>
        <button onclick="location.reload()">Foto Lagi</button>
    </div>

    <script>
        let selectedFrame = 'frame1.png';
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function setFrame(src, el) {
            selectedFrame = src;
            document.getElementById('frame-overlay').src = src;
            document.querySelectorAll('.frame-list img').forEach(img => img.classList.remove('selected'));
            el.classList.add('selected');
        }

        async function startBooth() {
            showPage('page-camera');
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
        }

        function countdown() {
            let count = 3;
            const timerEl = document.getElementById('timer');
            timerEl.style.display = 'block';
            document.getElementById('snap-btn').disabled = true;

            const interval = setInterval(() => {
                count--;
                timerEl.innerText = count;
                if (count === 0) {
                    clearInterval(interval);
                    timerEl.style.display = 'none';
                    takeSnap();
                }
            }, 1000);
        }

        function takeSnap() {
            canvas.width = 320;
            canvas.height = 480;
            const ctx = canvas.getContext('2d');
            // Gambar Video
            ctx.drawImage(video, 0, 0, 320, 480);
            // Gambar Frame di atasnya
            const img = new Image();
            img.src = selectedFrame;
            img.onload = () => {
                ctx.drawImage(img, 0, 0, 320, 480);
                showPage('page-result');
            };
        }
    </script>
</body>
</html>
