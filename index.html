<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIWAA PHOTOBOX</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; background: #1a1a1a; color: #fff; }
        .page { display: none; padding: 20px; }
        .active { display: block; }
        
        /* Area Kamera */
        #booth { 
            position: relative; 
            width: 320px; 
            height: 480px; 
            margin: 15px auto; 
            background: #333; 
            border: 8px solid #fff; 
            border-radius: 15px; 
            overflow: hidden; 
        }
        
        /* Video ditaruh paling depan agar kelihatan */
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 5; 
        }
        
        /* Frame transparan di atas video */
        #frame-overlay { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            z-index: 10; 
        }

        button { background: #ff69b4; color: #fff; border: none; padding: 15px 30px; border-radius: 50px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .frame-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 15px; }
        .frame-list img { width: 60px; height: 90px; border: 3px solid #555; cursor: pointer; border-radius: 5px; }
        .frame-list img.selected { border-color: #ff69b4; }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <h1>✨ WIWAA PHOTOBOX ✨</h1>
        <button onclick="showPage('page-select')">Mulai</button>
    </div>

    <div id="page-select" class="page">
        <h2>Pilih Frame</h2>
        <div class="frame-list">
            <img src="frame1.png" onclick="setFrame('frame1.png', this)" class="selected">
            <img src="frame2.png" onclick="setFrame('frame2.png', this)">
            <img src="frame4.png" onclick="setFrame('frame4.png', this)">
            <img src="frame5.png" onclick="setFrame('frame5.png', this)">
            <img src="frame6.png" onclick="setFrame('frame6.png', this)">
        </div>
        <button onclick="startBooth()">Buka Kamera</button>
    </div>

    <div id="page-camera" class="page">
        <div id="booth">
            <video id="video" autoplay playsinline muted></video>
            <img id="frame-overlay" src="frame1.png">
        </div>
        <button onclick="takeSnap()">📷 Ambil Foto</button>
    </div>

    <div id="page-result" class="page">
        <h2>Hasil!</h2>
        <canvas id="canvas" style="width: 280px; border-radius: 10px;"></canvas>
        <br>
        <button onclick="location.reload()">Ulangi</button>
    </div>

    <script>
        let selectedFrame = 'frame1.png';
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function setFrame(src, el) {
            selectedFrame = src;
            document.getElementById('frame-overlay').src = src;
            document.querySelectorAll('.frame-list img').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
        }

        async function startBooth() {
            showPage('page-camera');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 1280, height: 720 }, 
                    audio: false 
                });
                video.srcObject = stream;
                // Paksa video agar jalan
                video.onloadedmetadata = () => video.play();
            } catch (err) {
                alert("Kamera error: " + err.message);
            }
        }

        function takeSnap() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            const img = new Image();
            img.src = selectedFrame;
            img.onload = () => {
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                showPage('page-result');
                video.srcObject.getTracks().forEach(t => t.stop());
            };
        }
    </script>
</body>
</html>
